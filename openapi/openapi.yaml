openapi: 3.1.0
info:
  title: Bridgebox API
  version: 0.1.0
  description: Initial API contract for Bridgebox endpoints managed in SST.
  license:
    name: UNLICENSED
servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    description: AWS API Gateway
    variables:
      apiId:
        default: example
      region:
        default: us-east-2
      stage:
        default: prod
tags:
  - name: health
    description: Health and smoke-check endpoints.
  - name: webhooks
    description: Webhook endpoints.
  - name: messages
    description: Outbound message endpoints.
security: []
paths:
  /:
    get:
      tags: [health]
      operationId: getRootHealth
      summary: Basic health check
      responses:
        "200":
          description: Service is reachable.
          content:
            text/plain:
              schema:
                type: string
                example: Hello world. The time is 2026-01-01T00:00:00.000Z
        "400":
          $ref: "#/components/responses/BadRequest"
  /webhooks/meta:
    get:
      tags: [webhooks]
      operationId: getMetaWebhookVerify
      summary: Meta webhook verification challenge
      description: |
        Called by Meta when a new webhook subscription is registered.
        Returns the hub.challenge value if hub.mode is "subscribe" and
        hub.verify_token matches the configured server token.
      parameters:
        - name: hub.mode
          in: query
          required: true
          schema:
            type: string
            enum: [subscribe]
          description: Must be "subscribe" for Meta verification requests.
        - name: hub.verify_token
          in: query
          required: true
          schema:
            type: string
          description: Token set in the Meta developer portal, matched against WEBHOOK_VERIFY_TOKEN.
        - name: hub.challenge
          in: query
          required: true
          schema:
            type: string
          description: Random string from Meta that must be echoed back on success.
      responses:
        "200":
          description: Verification successful. Returns the hub.challenge value.
          content:
            text/plain:
              schema:
                type: string
                example: "1158201444"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [webhooks]
      operationId: postMetaWebhook
      summary: Accept webhook payload
      description: |
        Receives incoming event notifications from Meta (WhatsApp / Instagram).
        The x-hub-signature-256 header is required and validated against META_APP_SECRET
        using HMAC-SHA256 to confirm the request originates from Meta.
      parameters:
        - name: x-hub-signature-256
          in: header
          required: true
          schema:
            type: string
            example: "sha256=abc123"
          description: HMAC-SHA256 signature of the raw request body, prefixed with "sha256=".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetaWebhookPayload"
      responses:
        "200":
          description: Signature valid. Payload accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /send-message:
    post:
      tags: [messages]
      operationId: postSendMessage
      summary: Send outbound message through Meta
      description: |
        Sends a text message to a user through Meta Graph API.
        Supports instagram, facebook, and whatsapp channels.
      parameters:
        - name: x-api-key
          in: header
          required: false
          schema:
            type: string
          description: Optional app-level API key. Required when SEND_MESSAGE_API_KEY is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message accepted by Meta API.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No account found for provided platformAccountId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Meta API request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  responses:
    BadRequest:
      description: Request could not be processed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden. Verification token is missing or does not match.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized. x-hub-signature-256 header is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    MetaWebhookPayload:
      type: object
      additionalProperties: true
      description: Placeholder schema for incoming Meta webhook payload.
    SendMessageRequest:
      type: object
      required:
        - channel
        - platformAccountId
        - recipientId
        - text
      properties:
        channel:
          type: string
          enum: [instagram, facebook, whatsapp]
        platformAccountId:
          type: string
          description: Page ID (instagram/facebook) or Phone Number ID (whatsapp).
        recipientId:
          type: string
          description: PSID / IG scoped user ID / phone number depending on channel.
        text:
          type: string
          minLength: 1
          maxLength: 4000
    SendMessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Message sent
        result:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    SuccessResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: OK
